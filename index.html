<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALA | Yapay Zekaya Açılan Kapınız</title>
<meta name="description" id="metadesc" content="Şirket içi yapay zekâ altyapısı: kod ve verileriniz dışarı çıkmadan, kullanıcı başına lisans ücreti olmadan. Gala · GalaChat · GalaFlow.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --neon-pink: #FF2A6D;
        --neon-cyan: #05D9E8;
        --neon-purple: #D300C5;
        --neon-blue: #7B2FFF;
        --neon-yellow: #FFE700;
        --sunset-orange: #FF6B35;
        --dark-void: #0D0221;
        --dark-purple: #1A0533;
        --dark-blue: #120458;
        --grid-color: rgba(5, 217, 232, 0.15);
        --chrome: linear-gradient(135deg, #E8E8E8 0%, #FFFFFF 25%, #B8B8B8 50%, #FFFFFF 75%, #E8E8E8 100%);
        --term-green: #39FF88;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

    body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--dark-void);
        color: white;
        overflow-x: hidden;
        line-height: 1.6;
    }

    .grid-bg {
        position: fixed; inset: 0;
        background:
            linear-gradient(180deg, transparent 0%, var(--dark-void) 100%),
            repeating-linear-gradient(0deg, transparent, transparent 40px, var(--grid-color) 40px, var(--grid-color) 41px),
            repeating-linear-gradient(90deg, transparent, transparent 40px, var(--grid-color) 40px, var(--grid-color) 41px);
        z-index: 0;
    }
    .grid-floor {
        position: fixed; bottom: 0; left: -50%; right: -50%; height: 50vh;
        background:
            repeating-linear-gradient(90deg, transparent, transparent 60px, var(--neon-cyan) 60px, var(--neon-cyan) 61px),
            repeating-linear-gradient(0deg, transparent, transparent 30px, var(--neon-purple) 30px, var(--neon-purple) 31px);
        transform: rotateX(60deg); transform-origin: top center;
        opacity: 0.3; animation: gridMove 20s linear infinite;
        z-index: 0;
    }
    @keyframes gridMove { 0% { background-position: 0 0, 0 0; } 100% { background-position: 0 300px, 0 300px; } }
    @media (prefers-reduced-motion: reduce) { .grid-floor { animation: none; } }

    nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        padding: 1rem 5%;
        display: flex; justify-content: space-between; align-items: center; gap: 1rem;
        background: linear-gradient(180deg, var(--dark-void) 0%, transparent 100%);
        transition: all 0.3s ease;
    }
    nav.scrolled {
        background: rgba(13, 2, 33, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--neon-cyan);
        box-shadow: 0 0 20px rgba(5, 217, 232, 0.3);
    }
    .logo {
        font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 800;
        text-decoration: none; display: flex; align-items: center; gap: 0.75rem;
        color: var(--neon-cyan);
        text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan);
    }
    .logo-icon {
        width: 45px; height: 45px;
        background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-purple) 100%);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.2rem; color: white; text-shadow: none;
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
        color: white; text-decoration: none;
        font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 500;
        letter-spacing: 2px; text-transform: uppercase;
        transition: all 0.3s ease; position: relative;
    }
    .nav-links a::after {
        content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px;
        background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink);
        transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
    .nav-links a:hover::after { width: 100%; }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .lang-select {
        background: rgba(13, 2, 33, 0.9); color: var(--neon-cyan);
        border: 1px solid rgba(5, 217, 232, 0.5);
        font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
        padding: 0.5rem 0.7rem; cursor: pointer; letter-spacing: 1px;
    }
    .lang-select:focus-visible { outline: 2px solid var(--neon-yellow); }
    .lang-select option { background: var(--dark-void); color: white; }
    .nav-cta {
        padding: 0.75rem 1.5rem; background: transparent;
        border: 2px solid var(--neon-pink); color: var(--neon-pink);
        font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 600;
        letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
        transition: all 0.3s ease; position: relative; overflow: hidden;
        text-decoration: none; display: inline-block; white-space: nowrap;
    }
    .nav-cta::before {
        content: ''; position: absolute; inset: 0; background: var(--neon-pink);
        transform: translateX(-100%); transition: transform 0.3s ease; z-index: -1;
    }
    .nav-cta:hover { color: white; box-shadow: 0 0 20px var(--neon-pink); }
    .nav-cta:hover::before { transform: translateX(0); }

    .hero {
        min-height: 100vh;
        display: grid; grid-template-columns: 1.05fr 1fr; gap: 3rem; align-items: center;
        position: relative; padding: 8rem 5% 4rem; z-index: 1;
    }
    .hero-tag {
        display: inline-flex; align-items: center; gap: 0.75rem;
        padding: 0.5rem 1.5rem; border: 1px solid var(--neon-cyan);
        font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
        color: var(--neon-cyan); margin-bottom: 2rem;
        letter-spacing: 3px; text-transform: uppercase;
    }
    .hero-tag-pulse {
        width: 8px; height: 8px; background: var(--neon-cyan); border-radius: 50%;
        animation: pulse 1.5s infinite; box-shadow: 0 0 10px var(--neon-cyan);
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @media (prefers-reduced-motion: reduce) { .hero-tag-pulse { animation: none; } }
    .hero-title {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(2.2rem, 5.5vw, 4rem);
        font-weight: 900; line-height: 1.05; margin-bottom: 1.5rem;
        text-transform: uppercase; letter-spacing: -1px;
    }
    .hero-title .line-1 {
        display: block;
        background: var(--chrome);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
    }
    .hero-title .line-2 {
        display: block;
        background: linear-gradient(90deg, var(--neon-pink) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        filter: drop-shadow(0 0 20px var(--neon-pink));
    }
    .hero-description {
        font-size: 1.2rem; color: rgba(255, 255, 255, 0.8);
        max-width: 540px; margin-bottom: 2.5rem; font-weight: 500;
    }
    .hero-cta-group { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .btn-primary {
        padding: 1.1rem 2.6rem;
        background: linear-gradient(90deg, var(--neon-pink) 0%, var(--neon-purple) 100%);
        border: none; color: white;
        font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
        letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
        transition: all 0.3s ease; text-decoration: none; display: inline-block;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-purple); }
    .btn-secondary {
        padding: 1.1rem 2.6rem; background: transparent;
        border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
        font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
        letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
        transition: all 0.3s ease; text-decoration: none; display: inline-block;
        clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .btn-secondary:hover { background: var(--neon-cyan); color: var(--dark-void); box-shadow: 0 0 30px var(--neon-cyan); }

    .term {
        background: rgba(13, 2, 33, 0.9);
        border: 1px solid var(--neon-cyan);
        box-shadow: 0 0 10px rgba(5, 217, 232, 0.4), 0 0 30px rgba(5, 217, 232, 0.15), inset 0 0 20px rgba(5, 217, 232, 0.05);
        clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        overflow: hidden; min-height: 360px;
    }
    .term-bar {
        display: flex; align-items: center; gap: 8px; padding: 12px 16px;
        background: rgba(26, 5, 51, 0.9); border-bottom: 1px solid rgba(5, 217, 232, 0.4);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(5, 217, 232, 0.35); }
    .term-title { margin-left: 8px; font-size: 0.75rem; color: rgba(5, 217, 232, 0.7); font-family: 'Share Tech Mono', monospace; letter-spacing: 1px; }
    [dir="rtl"] .term-title { margin-left: 0; margin-right: 8px; }
    .badge-off {
        margin-left: auto; font-size: 0.7rem; color: var(--neon-pink);
        border: 1px solid var(--neon-pink); padding: 2px 10px;
        font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
        text-shadow: 0 0 8px var(--neon-pink);
    }
    [dir="rtl"] .badge-off { margin-left: 0; margin-right: auto; }
    .term-body {
        padding: 18px 18px 22px;
        font-family: 'Share Tech Mono', monospace; font-size: 0.82rem; line-height: 1.8;
        color: rgba(255, 255, 255, 0.85); white-space: pre-wrap;
    }
    .t-dim { color: rgba(255, 255, 255, 0.4); }
    .t-green { color: var(--term-green); text-shadow: 0 0 6px rgba(57, 255, 136, 0.5); }
    .t-red { color: var(--neon-pink); }
    .t-cyan { color: var(--neon-cyan); }
    .cursor {
        display: inline-block; width: 0.55em; height: 1.05em;
        background: var(--term-green); vertical-align: text-bottom;
        box-shadow: 0 0 8px var(--term-green);
        animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }

    section { padding: 6rem 5%; position: relative; z-index: 1; }
    .section-header { text-align: center; margin-bottom: 3.5rem; }
    .section-tag {
        display: inline-block; padding: 0.5rem 1.5rem;
        border: 1px solid var(--neon-pink);
        font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
        color: var(--neon-pink); text-transform: uppercase; letter-spacing: 3px;
        margin-bottom: 1rem;
    }
    .section-title {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.8rem, 4.5vw, 3rem); font-weight: 800;
        text-transform: uppercase; letter-spacing: 2px;
        background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-pink) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .section-subtitle {
        font-size: 1.1rem; color: rgba(255, 255, 255, 0.7);
        max-width: 620px; margin: 1rem auto 0;
    }

    .products-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
        max-width: 1200px; margin: 0 auto;
    }
    .product-card {
        background: rgba(13, 2, 33, 0.8);
        border: 1px solid rgba(5, 217, 232, 0.3);
        padding: 2.5rem 2rem; position: relative;
        transition: all 0.4s ease;
        clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        display: flex; flex-direction: column;
    }
    .product-card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
        transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
    }
    .product-card:hover {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 20px rgba(5, 217, 232, 0.3), inset 0 0 30px rgba(5, 217, 232, 0.05);
        transform: translateY(-5px);
    }
    .product-card:hover::before { transform: scaleX(1); }
    .product-name {
        font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 800;
        text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.35rem;
        color: var(--neon-cyan); text-shadow: 0 0 10px rgba(5, 217, 232, 0.5);
    }
    .product-card:nth-child(2) .product-name { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 42, 109, 0.5); }
    .product-card:nth-child(3) .product-name { color: var(--neon-purple); text-shadow: 0 0 10px rgba(211, 0, 197, 0.5); }
    .product-for {
        font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.5); letter-spacing: 1px; text-transform: uppercase;
        margin-bottom: 1.2rem;
    }
    .product-desc { color: rgba(255, 255, 255, 0.75); font-size: 0.97rem; line-height: 1.7; flex: 1; }
    .product-desc strong { color: white; }
    .product-status {
        margin-top: 1.5rem;
        font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
        letter-spacing: 2px; text-transform: uppercase; color: var(--term-green);
    }

    .features { background: linear-gradient(180deg, transparent 0%, rgba(26, 5, 51, 0.5) 100%); }
    .features-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem;
        max-width: 1200px; margin: 0 auto;
    }
    .feature-card {
        background: rgba(13, 2, 33, 0.8);
        border: 1px solid rgba(5, 217, 232, 0.3);
        padding: 2rem 1.6rem; position: relative; transition: all 0.4s ease;
        clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
    }
    .feature-card:hover {
        border-color: var(--neon-cyan);
        box-shadow: 0 0 20px rgba(5, 217, 232, 0.3);
        transform: translateY(-5px);
    }
    .feature-icon {
        width: 54px; height: 54px;
        background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-purple) 100%);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 1.3rem; font-size: 1.3rem;
    }
    .feature-card:nth-child(2) .feature-icon { background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 100%); }
    .feature-card:nth-child(3) .feature-icon { background: linear-gradient(135deg, var(--sunset-orange) 0%, var(--neon-pink) 100%); }
    .feature-card:nth-child(4) .feature-icon { background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-blue) 100%); }
    .feature-title {
        font-family: 'Orbitron', sans-serif; font-size: 1.05rem; font-weight: 700;
        color: white; margin-bottom: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
    }
    .feature-description { color: rgba(255, 255, 255, 0.7); font-size: 0.93rem; line-height: 1.7; }

    .process { background: linear-gradient(180deg, rgba(26, 5, 51, 0.5) 0%, transparent 100%); }
    .process-timeline { max-width: 900px; margin: 0 auto; position: relative; }
    .process-timeline::before {
        content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 2px;
        background: linear-gradient(180deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
        box-shadow: 0 0 10px var(--neon-cyan);
    }
    .process-step { display: flex; align-items: center; margin-bottom: 3rem; position: relative; }
    .process-step:nth-child(even) { flex-direction: row-reverse; }
    .process-step:nth-child(even) .process-content { text-align: right; padding-right: 4rem; padding-left: 0; }
    [dir="rtl"] .process-step:nth-child(even) .process-content { text-align: left; padding-left: 4rem; padding-right: 0; }
    .process-content { flex: 1; padding-left: 4rem; }
    [dir="rtl"] .process-content { padding-left: 0; padding-right: 4rem; }
    .process-number {
        position: absolute; left: 50%; transform: translateX(-50%);
        width: 60px; height: 60px; background: var(--dark-void);
        border: 2px solid var(--neon-cyan);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Orbitron', sans-serif; font-size: 1.25rem; font-weight: 700;
        color: var(--neon-cyan);
        box-shadow: 0 0 20px rgba(5, 217, 232, 0.5);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .process-title {
        font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 700;
        color: var(--neon-pink); margin-bottom: 0.5rem; text-transform: uppercase;
    }
    .process-text { color: rgba(255, 255, 255, 0.7); font-size: 1rem; }
    .process-dur {
        display: inline-block; margin-top: 0.4rem;
        font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
        color: var(--neon-cyan); letter-spacing: 2px;
    }

    .honest-container { max-width: 820px; margin: 0 auto; }
    .honest-card {
        background: rgba(13, 2, 33, 0.8);
        border: 1px solid rgba(5, 217, 232, 0.3);
        padding: 3rem; position: relative;
    }
    .honest-card::before, .honest-card::after {
        content: ''; position: absolute; width: 30px; height: 30px;
        border: 2px solid var(--neon-pink);
    }
    .honest-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .honest-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    .honest-card ul { list-style: none; }
    .honest-card li { margin-bottom: 1.2rem; color: rgba(255, 255, 255, 0.75); font-size: 1.05rem; padding-left: 1.6rem; position: relative; }
    [dir="rtl"] .honest-card li { padding-left: 0; padding-right: 1.6rem; }
    .honest-card li:last-child { margin-bottom: 0; }
    .honest-card li::before {
        content: '»'; position: absolute; left: 0; color: var(--neon-cyan);
        font-family: 'Share Tech Mono', monospace; text-shadow: 0 0 8px var(--neon-cyan);
    }
    [dir="rtl"] .honest-card li::before { left: auto; right: 0; content: '«'; }
    .honest-card li strong { color: white; }

    .stats-container {
        max-width: 1100px; margin: 0 auto;
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.6rem;
    }
    .stat-item {
        text-align: center; padding: 1.8rem 1.2rem;
        background: rgba(13, 2, 33, 0.6);
        border: 1px solid rgba(255, 42, 109, 0.3); position: relative;
    }
    .stat-item::before {
        content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
    }
    .stat-value {
        font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900;
        background: linear-gradient(180deg, var(--neon-cyan) 0%, var(--neon-pink) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        margin-bottom: 0.4rem;
    }
    .stat-label {
        font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.6); text-transform: uppercase; letter-spacing: 2px;
    }
    .stat-note { font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); margin-top: 0.4rem; }

    .cta-section { text-align: center; position: relative; overflow: hidden; }
    .cta-section::before {
        content: ''; position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 600px; height: 600px;
        background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
        opacity: 0.2; filter: blur(60px);
    }
    .cta-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    .cta-title {
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(1.8rem, 4.5vw, 3rem); font-weight: 900;
        text-transform: uppercase; margin-bottom: 1rem;
        background: linear-gradient(90deg, var(--neon-cyan) 0%, white 50%, var(--neon-pink) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .cta-subtitle { color: rgba(255, 255, 255, 0.7); font-size: 1.2rem; margin-bottom: 2.5rem; }
    .cta-buttons { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }

    footer {
        background: var(--dark-void); padding: 3rem 5% 2rem;
        border-top: 1px solid rgba(5, 217, 232, 0.2);
        position: relative; z-index: 1;
    }
    .footer-bottom {
        max-width: 1200px; margin: 0 auto;
        display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .footer-bottom p {
        font-family: 'Share Tech Mono', monospace;
        color: rgba(255, 255, 255, 0.4); font-size: 0.85rem;
    }
    .footer-bottom a { color: var(--neon-cyan); text-decoration: none; }

// --- language resolution: ?lang > localStorage > browser > en ---
function resolveLang() {
    const q = new URLSearchParams(location.search).get('lang');
    if (q && I18N[q]) return q;
    const saved = localStorage.getItem('gala-lang');
    if (saved && I18N[saved]) return saved;
    for (const cand of (navigator.languages || [navigator.language || 'en'])) {
        const base = String(cand).toLowerCase().split('-')[0];
        if (I18N[base]) return base;
    }
    return 'en';
}

function applyLang(lang) {
    const d = I18N[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.title = d['meta.title'];
    document.getElementById('metadesc').setAttribute('content', d['meta.desc']);
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (d[k] !== undefined) el.textContent = d[k];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const k = el.getAttribute('data-i18n-html');
        if (d[k] !== undefined) el.innerHTML = d[k];
    });
    localStorage.setItem('gala-lang', lang);
    startTerminal(d);
}

// language switcher
const sel = document.getElementById('langsel');
for (const [code, name] of Object.entries(LANGS)) {
    const o = document.createElement('option');
    o.value = code; o.textContent = name;
    sel.appendChild(o);
}
const initial = resolveLang();
sel.value = initial;
sel.addEventListener('change', () => applyLang(sel.value));

// Navbar scroll effect
var navbar = document.getElementById('navbar');
window.addEventListener('scroll', function () {
    if (window.scrollY > 50) { navbar.classList.add('scrolled'); }
    else { navbar.classList.remove('scrolled'); }
});

// Terminal demo animation (restartable, localized output lines)
let termTimers = [];
function startTerminal(d) {
    termTimers.forEach(t => clearTimeout(t) || clearInterval(t));
    termTimers = [];
    const lines = [
        { t: "$ ping 8.8.8.8", c: "" },
        { t: d['term.fail'], c: "t-red" },
        { t: "", c: "" },
        { t: "$ node index.js total", c: "" },
        { t: d['term.bug'], c: "t-dim" },
        { t: "", c: "" },
        { t: d['term.cmd'], c: "" },
        { t: d['term.read'], c: "t-dim" },
        { t: d['term.edit'], c: "t-cyan" },
        { t: "", c: "" },
        { t: "$ node index.js total", c: "" },
        { t: "Total: 15.5", c: "t-green" },
        { t: "", c: "" },
        { t: d['term.ok'], c: "t-green" }
    ];
    const el = document.getElementById('termbody');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
    function render(upto, partial) {
        let html = "";
        for (let i = 0; i < upto; i++) {
            const l = lines[i];
            html += l.c ? '<span class="' + l.c + '">' + esc(l.t) + "</span>\n" : esc(l.t) + "\n";
        }
        if (partial !== undefined) {
            const p = lines[upto];
            const frag = p.t.slice(0, partial);
            html += p.c ? '<span class="' + p.c + '">' + esc(frag) + "</span>" : esc(frag);
        }
        el.innerHTML = html + '<span class="cursor"></span>';
    }
    if (reduce) { render(lines.length); return; }
    let li = 0;
    function nextLine() {
        if (li >= lines.length) { render(lines.length); return; }
        const isCmd = lines[li].t.charAt(0) === "$";
        if (isCmd) {
            let ch = 0;
            const iv = setInterval(function () {
                ch++;
                render(li, ch);
                if (ch >= lines[li].t.length) {
                    clearInterval(iv); li++;
                    termTimers.push(setTimeout(nextLine, 420));
                }
            }, 26);
            termTimers.push(iv);
        } else {
            li++;
            render(li);
            termTimers.push(setTimeout(nextLine, lines[li - 1] && lines[li - 1].t === "" ? 140 : 340));
        }
    }
    termTimers.push(setTimeout(nextLine, 600));
}

applyLang(initial);

// Smooth scroll
document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
    anchor.addEventListener('click', function (e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    });
});
